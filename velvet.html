<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velvet Brew | Artisanal Luxury Coffee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Urbanist:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0B0A09; color: #F5F5F4; font-family: 'Urbanist', sans-serif; }
        h1, h2, h3 { font-family: 'Cormorant Garamond', serif; }
        .nav-blur { background: rgba(11, 10, 9, 0.8); backdrop-filter: blur(12px); }
        .luxury-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(212, 175, 55, 0.1); transition: all 0.3s ease; }
        .luxury-card:hover { border-color: #D4AF37; }
        .btn-gold { background: #D4AF37; color: #0B0A09; transition: all 0.3s ease; }
        .btn-gold:hover { background: #b89630; transform: scale(1.05); }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="nav-blur sticky top-0 z-50 border-b border-white/[0.05]">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <a href="#" class="text-2xl font-bold tracking-widest text-[#F5F5F4] font-serif">VELVET <span class="text-[#D4AF37] font-light">BREW</span></a>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="max-w-7xl mx-auto px-6 py-20 grid lg:grid-cols-2 gap-16 items-center">
        <div class="space-y-8">
            <h1 class="text-6xl md:text-8xl font-serif text-white leading-[0.9]">Crafted for the <span class="italic text-[#D4AF37]">Discerning</span> Palette.</h1>
            <p class="text-stone-400 text-lg">Experience rich, single-origin espresso.</p>
        </div>
        <img src="https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?auto=format&fit=crop&q=80&w=800" class="rounded-[2rem] w-full h-[500px] object-cover">
    </section>

    <!-- Coffee Journey (Clickable) -->
    <section class="max-w-3xl mx-auto px-6 py-24 border-t border-white/[0.05]">
        <h2 class="text-4xl font-serif text-white text-center mb-16">The Coffee Journey</h2>
        <div class="relative border-l border-stone-800 ml-4 md:ml-0 space-y-12">
            <!-- 01 Farm -->
            <div onclick="openModal('Ethical Farm Sourcing', 'We partner directly with high-altitude micro-lots to ensure fair wages and premium beans.')" class="relative pl-8 group cursor-pointer hover:pl-10 transition-all">
                <div class="absolute -left-1.5 top-0 w-3 h-3 rounded-full bg-[#D4AF37]"></div>
                <h3 class="text-[#D4AF37] text-sm uppercase tracking-[0.2em]">01</h3>
                <p class="text-white text-2xl font-serif group-hover:text-[#D4AF37]">Ethical Farm Sourcing</p>
            </div>
            <!-- 02 Selection -->
            <div onclick="openModal('Precision Selection', 'Every batch undergoes rigorous quality testing to ensure only the top 1% reaches you.')" class="relative pl-8 group cursor-pointer hover:pl-10 transition-all">
                <div class="absolute -left-1.5 top-0 w-3 h-3 rounded-full bg-[#D4AF37]"></div>
                <h3 class="text-[#D4AF37] text-sm uppercase tracking-[0.2em]">02</h3>
                <p class="text-white text-2xl font-serif group-hover:text-[#D4AF37]">Precision Selection</p>
            </div>
        </div>
    </section>

    <!-- Modal Pop-up Structure -->
    <div id="coffeeModal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
        <div class="bg-[#1a1918] border border-[#D4AF37]/30 p-8 rounded-3xl max-w-lg w-full relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-white hover:text-[#D4AF37]">✕</button>
            <h3 id="modalTitle" class="text-3xl font-serif text-[#D4AF37] mb-4"></h3>
            <p id="modalBody" class="text-stone-300 leading-relaxed"></p>
        </div>
    </div>

    <!-- Script for Modal -->
    <script>
        function openModal(title, body) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalBody').innerText = body;
            document.getElementById('coffeeModal').classList.remove('hidden');
            document.getElementById('coffeeModal').classList.add('flex');
        }
        function closeModal() {
            document.getElementById('coffeeModal').classList.add('hidden');
            document.getElementById('coffeeModal').classList.remove('flex');
        }
    </script>

</body>
</html>
