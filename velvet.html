<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velvet Brew | Artisanal Luxury Coffee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Urbanist:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0B0A09; color: #F5F5F4; font-family: 'Urbanist', sans-serif; }
        h1, h2, h3 { font-family: 'Cormorant Garamond', serif; }
        .nav-blur { background: rgba(11, 10, 9, 0.8); backdrop-filter: blur(12px); }
    </style>
</head>
<body>

    <!-- Premium Navbar -->
    <nav class="nav-blur sticky top-0 z-50 border-b border-white/[0.05]">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <!-- Logo -->
            <a href="#" class="text-2xl font-bold tracking-widest text-[#F5F5F4] font-serif">
                VELVET <span class="text-[#D4AF37] font-light">BREW</span>
            </a>
            <!-- Links -->
            <div class="hidden md:flex gap-10 text-[12px] uppercase tracking-[0.2em] text-stone-400 font-medium">
                <a href="#" class="hover:text-[#D4AF37] transition-colors">Home</a>
                <a href="#story" class="hover:text-[#D4AF37] transition-colors">Our Story</a>
                <a href="#menu" class="hover:text-[#D4AF37] transition-colors">Menu</a>
                <a href="#contact" class="hover:text-[#D4AF37] transition-colors">Contact</a>
            </div>
            <!-- CTA Button -->
            <a href="#" class="border border-[#D4AF37] text-[#D4AF37] px-6 py-2 rounded-full text-[12px] uppercase tracking-widest hover:bg-[#D4AF37] hover:text-[#0B0A09] transition-all">
                Reserve
            </a>
        </div>
    </nav>

    <!-- Main Content Area Starts Here -->
    <section class="py-20 text-center">
        <h2 class="text-3xl text-stone-500 italic">Stay tuned for the masterpiece...</h2>
    </section>

</body>
</html>
