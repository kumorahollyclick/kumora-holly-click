<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velvet Brew | Artisanal Luxury Coffee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Urbanist:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0B0A09; color: #F5F5F4; font-family: 'Urbanist', sans-serif; }
        h1, h2, h3 { font-family: 'Cormorant Garamond', serif; }
        .nav-blur { background: rgba(11, 10, 9, 0.8); backdrop-filter: blur(12px); }
        .luxury-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(212, 175, 55, 0.1); }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="nav-blur sticky top-0 z-50 border-b border-white/[0.05]">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <a href="#" class="text-2xl font-bold tracking-widest text-[#F5F5F4] font-serif">VELVET <span class="text-[#D4AF37] font-light">BREW</span></a>
            <div class="hidden md:flex gap-10 text-[12px] uppercase tracking-[0.2em] text-stone-400 font-medium">
                <a href="#">Home</a> <a href="#story">Our Story</a> <a href="#menu">Menu</a>
            </div>
            <a href="#" class="border border-[#D4AF37] text-[#D4AF37] px-6 py-2 rounded-full text-[12px] uppercase tracking-widest hover:bg-[#D4AF37] hover:text-[#0B0A09] transition-all">Reserve</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="max-w-7xl mx-auto px-6 py-20 grid lg:grid-cols-2 gap-16 items-center">
        <div class="space-y-8">
            <h1 class="text-6xl md:text-8xl font-serif text-white leading-[0.9]">Crafted for the <span class="italic text-[#D4AF37]">Discerning</span> Palette.</h1>
            <p class="text-stone-400 text-lg">Experience rich, single-origin espresso meticulously brewed to absolute perfection.</p>
            <a href="#menu" class="inline-block bg-[#D4AF37] text-[#0B0A09] px-10 py-4 rounded-full font-bold tracking-widest uppercase text-xs">Explore Blends</a>
        </div>
        <img src="https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?auto=format&fit=crop&q=80&w=800" class="rounded-[2rem] w-full h-[500px] object-cover">
    </section>

</body>
</html>
