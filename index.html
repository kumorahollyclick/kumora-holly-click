<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kumora Holly Click</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333333;
            text-align: center;
            padding: 40px 20px;
        }

        h1 {
            color: #4a0e17; /* برانڈ کا نیا گہرا خوبصورت رنگ */
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.1rem;
            color: #4a5568;
            margin-bottom: 30px;
        }

        ul {
            list-style: none;
            padding: 0;
            max-width: 400px;
            margin: 0 auto;
        }

        li {
            margin-bottom: 15px;
        }

        /* یہاں ہم نے بٹنز کا رنگ تبدیل کر دیا ہے */
        a {
            display: block;
            background-color: #4a0e17; /* نیا مرون رنگ */
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        /* جب بٹن پر ماؤس جائے گا */
        a:hover {
            background-color: #6b1d2f; /* ماؤس لے جانے پر تھوڑا ہلکا رنگ */
        }
    </style>
</head>
<body>

    <h1>Kumora Holly Click</h1>
    <p>میری آفیشل ویب سائٹ اور پورٹ فولیو پر خوش آمدید۔</p>

    <ul>
        <li><a href="https://www.blogger.com" target="_blank">🌐 میرا آفیشل بلاگ وزٹ کریں</a></li>
        <li><a href="https://www.pinterest.com" target="_blank">📌 Pinterest پر فالو کریں</a></li>
        <li><a href="https://www.tiktok.com" target="_blank">🎵 TikTok پر فالو کریں</a></li>
        <li><a href="https://www.youtube.com" target="_blank">🎬 YouTube Shorts دیکھیں</a></li>
    </ul>

    <script>
        window.onload = function() {
            alert("Kumora Holly Click پر خوش آمدید! ❤️");
        };
    </script>

</body>
</html>
