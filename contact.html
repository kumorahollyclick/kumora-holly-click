<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | KUMORA HOLLY CLICK</title>
    <meta name="description" content="Reach out to Kumora Holly Click for premium partnerships, inquiries, or curation suggestions.">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;650;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --color-bg: #0A0A0B;
            --color-card: #121214;
            --color-accent: #D4AF37;
            --color-accent-hover: #F3E5AB;
            --color-text-primary: #F5F5F7;
            --color-text-secondary: #86868B;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text-primary);
            font-family: 'Urbanist', sans-serif;
            letter-spacing: -0.01em;
            -webkit-font-smoothing: antialiased;
        }

        .premium-nav {
            background: rgba(10, 10, 11, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .luxury-card {
            background: linear-gradient(180deg, rgba(20, 20, 22, 0.8) 0%, rgba(18, 18, 20, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
        }

        .input-premium {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #FFFFFF;
            transition: all 0.3s ease;
        }
        .input-premium:focus {
            outline: none;
            border-color: var(--color-accent);
            background: rgba(255, 255, 255, 0.04);
        }

        .btn-premium-primary {
            background: var(--color-accent);
            color: #000000;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            font-weight: 650;
        }
        .btn-premium-primary:hover {
            background: var(--color-accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <header class="sticky top-0 z-50 premium-nav px-6 py-4">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex justify-between items-center w-full md:w-auto">
                <a href="index.html" class="text-xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-400">
                    KUMORA <span class="text-[#D4AF37]">HOLLY CLICK</span>
                </a>
                <button id="menu-toggle" class="md:hidden text-neutral-400 hover:text-white focus:outline-none text-xl p-1">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <nav id="nav-menu" class="hidden md:flex flex-col md:flex-row gap-6 md:gap-8 text-[14px] font-medium text-neutral-400 w-full md:w-auto text-center md:text-left pt-2 md:pt-0">
                <a href="index.html" class="hover:text-white py-1 md:py-0 transition">Home</a>
                <a href="blog.html" class="hover:text-white py-1 md:py-0 transition">Blog</a>
                <a href="reviews.html" class="hover:text-white py-1 md:py-0 transition">Product Reviews</a>
                <a href="about.html" class="hover:text-white py-1 md:py-0 transition">About</a>
                <a href="contact.html" class="text-[#D4AF37] py-1 md:py-0 transition">Contact</a>
            </nav>
        </div>
    </header>

    <section class="max-w-4xl mx-auto px-6 py-16 text-center">
        <p class="text-xs font-semibold tracking-widest text-[#D4AF37] uppercase mb-3">Connect With Us</p>
        <h1 class="text-4xl md:text-5xl font-extrabold text-white mb-6 tracking-tight">Let's Collaborate</h1>
        <p class="text-[16px] md:text-[18px] text-neutral-400 font-light leading-relaxed max-w-xl mx-auto">
            Have a premium product suggestion, partnership inquiry, or just want to say hello? Drop your message below.
        </p>
    </section>

    <main class="max-w-xl mx-auto px-6 py-4 w-full flex-grow">
        <div class="luxury-card rounded-3xl p-8 border border-white/[0.02]">
            <form action="#" method="POST" class="flex flex-col gap-6">
                <div>
                    <label class="block text-xs font-semibold tracking-wider text-neutral-400 uppercase mb-2">Full Name</label>
                    <input type="text" placeholder="John Doe" class="w-full input-premium rounded-xl px-4 py-3.5 text-sm" required>
                </div>
                <div>
                    <label class="block text-xs font-semibold tracking-wider text-neutral-400 uppercase mb-2">Email Address</label>
                    <input type="email" placeholder="john@example.com" class="w-full input-premium rounded-xl px-4 py-3.5 text-sm" required>
                </div>
                <div>
                    <label class="block text-xs font-semibold tracking-wider text-neutral-400 uppercase mb-2">Your Message</label>
                    <textarea rows="5" placeholder="Write your message here..." class="w-full input-premium rounded-xl px-4 py-3.5 text-sm resize-none" required></textarea>
                </div>
                <button type="submit" class="btn-premium-primary w-full py-4 rounded-full text-sm font-bold shadow-lg cursor-pointer">
                    Send Message
                </button>
            </form>
        </div>
    </main>

    <footer class="premium-nav px-6 py-8 mt-20 w-full">
        <div class="max-w-6xl mx-auto text-center flex flex-col items-center gap-4">
            <p class="text-xs text-neutral-500">&copy; 2026 Kumora Holly Click. Built for Excellence.</p>
        </div>
    </footer>

    <script>
        const menuToggle = document.getElementById('menu-toggle');
        const navMenu = document.getElementById('nav-menu');
        menuToggle.addEventListener('click', () => {
            navMenu.classList.toggle('hidden');
            navMenu.classList.toggle('flex');
            navMenu.classList.toggle('flex-col');
        });
    </script>
</body>
</html>
